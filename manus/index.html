<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manus версия — Скоро</title>
<style>
  :root { --navy:#0d1b3e; --green:#52b788; --gold:#c9a84c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    color: white;
  }
  .icon { font-size: 4rem; margin-bottom: 1.5rem; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  h1 { color: var(--green); font-size: 2rem; margin-bottom: 0.8rem; }
  p { color: rgba(255,255,255,0.65); font-size: 1rem; max-width: 380px; line-height: 1.7; margin-bottom: 2rem; }
  a {
    display: inline-block;
    background: rgba(82,183,136,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.6rem 1.4rem;
    border-radius: 30px;
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  a:hover { background: rgba(82,183,136,0.3); }
</style>
</head>
<body>
  <div class="icon">✨</div>
  <h1>Версия Manus</h1>
  <p>Эта версия сайта запоминания Суры Аль-Мульк, созданная агентом Manus, скоро появится здесь.</p>
  <a href="../">← Вернуться на главную</a>
</body>
</html>
